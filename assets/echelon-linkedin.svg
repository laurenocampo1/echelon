<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0D0D12"/>
      <stop offset="100%" stop-color="#1A1830"/>
    </linearGradient>
    <clipPath id="wordClip">
      <text x="200" y="306" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="10" text-anchor="middle">ECHELON</text>
    </clipPath>
    <clipPath id="tagClip">
      <text x="200" y="332" font-family="Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="3.5" text-anchor="middle">ONE LAYER ABOVE</text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bgGrad)"/>

  <!-- Staircase bars — keep gradient -->
  <rect x="108" y="190" width="30" height="58"  rx="6" fill="url(#barGrad)" opacity="0.45"/>
  <rect x="152" y="158" width="30" height="90"  rx="6" fill="url(#barGrad)" opacity="0.65"/>
  <rect x="196" y="122" width="30" height="126" rx="6" fill="url(#barGrad)" opacity="0.85"/>
  <rect x="240" y="88"  width="30" height="160" rx="6" fill="url(#barGrad)"/>

  <!-- White text via clip -->
  <rect x="0" y="270" width="400" height="50" fill="white" clip-path="url(#wordClip)"/>
  <rect x="0" y="318" width="400" height="22" fill="rgba(255,255,255,0.38)" clip-path="url(#tagClip)"/>
</svg>
