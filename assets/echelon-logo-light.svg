<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Staircase bars — gold, bottom-aligned -->
  <rect x="0"  y="32" width="7" height="14" rx="2" fill="#D4AF37" opacity="0.35"/>
  <rect x="11" y="23" width="7" height="23" rx="2" fill="#D4AF37" opacity="0.55"/>
  <rect x="22" y="14" width="7" height="32" rx="2" fill="#D4AF37" opacity="0.78"/>
  <rect x="33" y="5"  width="7" height="41" rx="2" fill="#D4AF37"/>

  <!-- Separator -->
  <line x1="56" y1="8" x2="56" y2="48" stroke="rgba(212,175,55,0.22)" stroke-width="1"/>

  <!-- Wordmark — off-white, for dark backgrounds -->
  <text x="70" y="33"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="800"
    letter-spacing="6"
    fill="#F5F5F0">ECHELON</text>

  <!-- Tagline -->
  <text x="71" y="46"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="2.8"
    fill="rgba(245,245,240,0.38)">ONE LAYER ABOVE</text>
</svg>
